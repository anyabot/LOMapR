# Cloudflare Pages config for `wrangler pages dev/deploy`.
# The app is a pure static SPA: `next build` (output: 'export') emits plain
# HTML/JS/CSS to /out with NO _worker.js, so requests are served straight from
# the CDN and never count against the Workers/Functions request quota. Data and
# route params are resolved client-side (data from R2, params from ?id= query).

name = "lomapr"
pages_build_output_dir = "out"
compatibility_date = "2024-09-23"
