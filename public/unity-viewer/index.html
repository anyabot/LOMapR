<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>멸망 전의 전술 교본 - Skin Viewer γ</title>
    <link rel="shortcut icon" href="TemplateData/icon.png">
    <link rel="stylesheet" href="TemplateData/style.css?_=2">
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width=1280 height=720 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>
    <script data-cfasync="false">
      // Redirect /models/* and /rebuilt/* asset fetches to R2
      (function() {
        var R2_BASE = "https://pub-7a0fe80c39434a24b28a3cf9740e0d71.r2.dev";
        var ASSET_RE = /^\/(?:(models)|(rebuilt))\/(.+)/;
        function rewriteUrl(url) {
          if (url.indexOf(R2_BASE) === 0) return null;
          var m = ASSET_RE.exec(url);
          if (m) {
            var prefix = m[2] ? "rebuilt" : "models";
            return R2_BASE + "/" + prefix + "/" + m[3];
          }
          return null;
        }
        var _origFetch = window.fetch;
        window.fetch = function(input, init) {
          var url = (input instanceof Request) ? input.url : String(input);
          var rewritten = rewriteUrl(url);
          if (rewritten) {
            if (input instanceof Request) input = new Request(rewritten, input);
            else input = rewritten;
          }
          return _origFetch.call(this, input, init);
        };
        var _origXHROpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function(method, url) {
          if (typeof url === 'string') {
            var rewritten = rewriteUrl(url);
            if (rewritten) url = rewritten;
          }
          return _origXHROpen.apply(this, [method, url].concat(Array.prototype.slice.call(arguments, 2)));
        };
      })();
    </script>
    <script data-cfasync="false">
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/a30f606fc06a05307614c61975b41df0.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/5447d49e202b6939933fd2bc1bc33bd8.data.unityweb",
        frameworkUrl: buildUrl + "/69e88038c907147467f61a1f70fbab13.framework.js.unityweb",
        codeUrl: buildUrl + "/41924c5542dde1e122f14e82ef8ec5a1.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "WolfgangKurz",
        productName: "Skin Viewer γ",
        productVersion: "1.0.5",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
      }

      loadingBar.style.display = "block";

      (function () {
        var unity_instance;
        var messageQueue = [];

        function procMessage(msg) {
          switch (msg.type) {
            case "collider":
              unity_instance.SendMessage("MainScript", "SetColliderBoxView", msg.active ? 1 : 0);
              break;
            case "bg":
              unity_instance.SendMessage("MainScript", "SetBgView", msg.active ? 1 : 0);
              break;
            case "part":
              unity_instance.SendMessage("MainScript", "SetPartsView", msg.active ? 1 : 0);
              break;
            case "face":
              unity_instance.SendMessage("MainScript", "SetFace", msg.face);
              break;
            case "model":
              unity_instance.SendMessage("MainScript", "SetModel", msg.model);
              break;
            case "variant":
              unity_instance.SendMessage("MainScript", "SetVariant", msg.variant || "base");
              break;
          }
        }

        // Called by Unity (via viewer_set_variants JS plugin) to report available variants
        window.viewer_set_variants = function(variantStr) {
          var variants = variantStr ? variantStr.split("|").filter(Boolean) : [];
          window.parent.postMessage({ type: "variants", data: variants }, "*");
        };

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
          createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
          }).then((unityInstance) => {
            loadingBar.style.display = "none";
            unity_instance = unityInstance;

            console.log("processing queued messages");
            while (messageQueue.length > 0) {
                var msg = messageQueue[0];
                messageQueue.splice(0, 1);

                procMessage(msg);
            }
          }).catch((message) => {
            alert(message);
          });
        };

        window.addEventListener("message", function(e) {
          if (!unity_instance) {
            console.log("unity instance not ready yet, push to queue");
            messageQueue.push(e.data);
            return;
          }
          procMessage(e.data);
        });
        document.body.appendChild(script);
      })();
    </script>
  </body>
</html>
